<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanghai Shadows</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --fg: #e0e0e0;
            --accent: #c0392b;
            --dim: #555;
            --green: #27ae60;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #terminal {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #input-line {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-top: 1px solid #333;
        }

        #prompt {
            color: var(--green);
            margin-right: 0.5rem;
            user-select: none;
        }

        #input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: inherit;
            outline: none;
        }

        #status {
            padding: 0.3rem 1rem;
            font-size: 12px;
            color: var(--dim);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }

        .connected { color: var(--green); }
        .disconnected { color: var(--accent); }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="input-line">
        <span id="prompt">&gt; </span>
        <input id="input" type="text" autocomplete="off" autofocus />
    </div>
    <div id="status">
        <span id="conn-status" class="disconnected">Disconnected</span>
        <span>Shanghai Shadows · Day 1 Build</span>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('input');
        const promptSpan = document.getElementById('prompt');
        const connStatus = document.getElementById('conn-status');

        let history = [];
        let historyIndex = -1;

        const ws = new WebSocket('ws://127.0.0.1:8765');

        ws.onopen = () => {
            connStatus.textContent = 'Connected';
            connStatus.className = 'connected';
        };

        ws.onclose = () => {
            connStatus.textContent = 'Disconnected';
            connStatus.className = 'disconnected';
            appendText('\n[Connection lost. Refresh to reconnect.]');
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'display') {
                appendText(msg.payload);
                terminal.scrollTop = terminal.scrollHeight;
            } else if (msg.type === 'prompt') {
                promptSpan.textContent = msg.payload;
                input.disabled = false;
                input.focus();
            }
        };

        function appendText(text) {
            const div = document.createElement('div');
            div.innerHTML = text.replace(/\n/g, '<br>');
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const text = input.value;
                if (text.trim()) {
                    appendText(promptSpan.textContent + text);
                    history.push(text);
                    historyIndex = history.length;
                }
                ws.send(text);
                input.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = history[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    input.value = history[historyIndex];
                } else {
                    historyIndex = history.length;
                    input.value = '';
                }
            }
        });

        // Keep focus on input
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
