rules:
  - action: "talk_to_resistance.courier"
    deltas:
      resistance.courier: 10
      kempeitai.informant: -5
    visible: true

  - action: "talk_to_resistance.safehouse"
    deltas:
      resistance.safehouse: 8
      kempeitai.officer: -3
    visible: true

  - action: "talk_to_kempeitai.officer"
    deltas:
      kempeitai.officer: 8
      resistance.courier: -10
      civilian.resident: -4
    visible: true

  - action: "talk_to_civilian.vendor"
    deltas:
      civilian.vendor: 6
    visible: false

  - action: "talk_to_green_gang.smuggler"
    deltas:
      green_gang.smuggler: 8
      civilian.vendor: -3
    visible: true

  - action: "out_after_curfew"
    deltas:
      civilian.resident: -10
      civilian.worker: -8
      kempeitai.patrol: 6
    visible: true
