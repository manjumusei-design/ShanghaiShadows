            kempeitai.informant: -10
          change_influence:
            ccp: 8
          log_event: "You helped dockworkers organize a strike against Japanese overseers."
          add_item: resistance_map
      - text: "Disperse the crowd."
        effects:
          change_trust:
            kempeitai.informant: 3
          log_event: "You chose to disperse a group of workers."

  - id: ccp_sabotage_supply_run
    location_tags: [warehouse, docks]
    trigger_chance: 0.4
    preconditions:
      trust_ranges:
        ccp.guerrilla: [50, 100]
      flags_missing: [sabotaged_supplies]
    narrative: "A Japanese supply truck sits idling outside a warehouse, its driver chatting with a guard. The cargo contains ammunition bound for the front lines that could be destroyed with a well-placed fire. The risk is enormous. The reward is just as big."
    options:
      - text: "Slip behind the truck and ignite the fuel line."
        effects:
          set_flag: sabotaged_supplies
          change_trust:
            ccp.guerrilla: 20
            kempeitai.officer: -20
          change_influence:
            ccp: 10
          log_event: "You destroyed a Japanese ammunition truck. The explosion lit up the warehouse district."
      - text: "Report the truck's location to the underground. Let others take the risk."
        effects:
          change_trust:
            ccp.guerrilla: 5
          log_event: "You passed intelligence about a Japanese supply truck to the underground."

  - id: ccp_distribute_pamphlets
    location_tags: [old_city, school]
    trigger_chance: 0.6
    preconditions:
      trust_ranges:
        ccp.courier: [35, 100]
      game_hour: [17, 22]
      flags_missing: [distributed_pamphlets]
    narrative: "A stack of resistance pamphlets sits in a hidden compartment beneath a market stall. The text exposes the Nanjing Massacre in unflinching detail — the systematic murder of hundreds of thousands of Chinese civilians by Japanese soldiers. Distributing them is a death sentence. Not distributing them means the truth dies."
    options:
      - text: "Take the pamphlets and slip them into passersby's hands."
        effects:
          set_flag: distributed_pamphlets
          change_trust:
            ccp.courier: 12
            civilian.resident: 8
            kempeitai.patrol: -15
          change_influence:
            ccp: 6
          log_event: "You distributed banned pamphlets exposing Japanese atrocities in the old city."
          add_item: ccp_pamphlet
      - text: "Leave them. The risk is too great right now."
        effects:
          change_trust:
            kempeitai.patrol: 2
          log_event: "You decided not to distribute the pamphlets tonight."

