      - text: "Note the officer's movements and report to intelligence."
        effects:
          change_trust:
            gmd.officer: 5
          log_event: "You reported a Japanese officer's movements to GMD intelligence."

  - id: gmd_smuggle_medicine
    location_tags: [docks, warehouse]
    trigger_chance: 0.5
    preconditions:
      trust_ranges:
        gmd.smuggler: [40, 100]
      flags_missing: [smuggled_medicine]
    narrative: "A fishing boat slips into the wharf at midnight, its hull packed full with medical supplies like quinine, bandages, surgical tools that are meant for underground clinics that treat Chinese civilians while Japanese hospitals turn them away. The Kempeitai patrol boat is due in twenty minutes."
    options:
      - text: "Help unload the supplies before the patrol arrives."
        effects:
