storylets:
  - id: wounded_courier
    location_tags: [old_city, alley]
    trigger_chance: 0.7
    preconditions:
      trust_ranges:
        civilian.resident: [30, 90]
      game_hour: [20, 23]
      flags_missing: [helped_courier, betrayed_courier]
    narrative: "A man stumbles out of the dark with one hand over a wet wound. A Resistance armband flashes beneath his coat before he hides it again."
    options:
      - text: "Help him into the shadows."
        effects:
          set_flag: helped_courier
          change_trust:
            ccp.courier: 15
            civilian.resident: 8
          add_item: bloodied_message
          log_event: "You hid a wounded courier from the patrols."
        followup_storylet: grateful_contact
      - text: "Alert the patrol."
        effects:
          set_flag: betrayed_courier
          change_trust:
            kempeitai.patrol: 18
            civilian.resident: -20
          log_event: "You betrayed a wounded courier to the authorities."

  - id: grateful_contact
    location_tags: [old_city, shrine]
    trigger_chance: 0.8
    preconditions:
      flags_required: [helped_courier]
      flags_missing: [met_grateful_contact]
    narrative: "A woman waiting beside a shrine does not look at you when she speaks. 'The man you saved still breathes. Take this and keep walking.'"
    options:
      - text: "Accept the forged pass."
        effects:
          set_flag: met_grateful_contact
          add_item: forged_pass
          change_trust:
            resistance.safehouse: 10
          log_event: "A grateful contact gave you a forged pass."
      - text: "Refuse and move on."
        effects:
          set_flag: met_grateful_contact
          change_trust:
            resistance.safehouse: 3
          log_event: "You refused a reward from the Resistance."

  - id: tea_house_whisper
    location_tags: [teahouse]
    trigger_chance: 0.55
    preconditions:
      game_hour: [14, 20]
      flags_missing: [heard_teahouse_whisper]
    narrative: "Two patrons pause their game of xiangqi when you sit too close. One line drifts your way anyway: 'Tonight. Pier Six. No mistakes.'"
    options:
      - text: "Memorize the line and leave quietly."
        effects:
          set_flag: heard_teahouse_whisper
          change_trust:
            resistance.courier: 4
          log_event: "You overheard a whisper about Pier Six."
      - text: "Lean in and press for more."
        effects:
          set_flag: heard_teahouse_whisper
          change_trust:
            civilian.vendor: -6
            resistance.courier: -4
          log_event: "You pressed strangers too hard for information and made them uncomfortable."

  - id: night_knock
    location_tags: [lilong, residence]
    trigger_chance: 0.45
    preconditions:
      game_hour: [22, 23]
      flags_missing: [answered_night_knock]
    narrative: "A knock comes in a rhythm no honest visitor would ever use. The lane outside has already gone quiet."
    options:
      - text: "Open the door a crack."
        effects:
          set_flag: answered_night_knock
          change_trust:
            ccp.safehouse: 8
          add_item: coded_ledger
          log_event: "A covert visitor left you a coded ledger."
      - text: "Stay silent and let them go."
        effects:
          set_flag: answered_night_knock
          change_trust:
            civilian.resident: 4
          log_event: "You chose caution over contact after a suspicious knock."

  - id: rice_queue_argument
    location_tags: [market] 
    trigger_chance: 0.6
    preconditions:
      flags_missing: [settled_rice_queue]
    narrative: "The ration queue buckles into anger when a clerk tries to close the window early. Hunger subsequently makes the crowd brave for one minute at at time."
    options:
      - text: "Calm the crowd and negotiate."
        effects:
          set_flag: settled_rice_queue
          change_trust:
            civilian.vendor: 8
            civilian.worker: 5
          log_event: "You calmed a ration queue before it turned into a riot."
      - text: "Fan the anger and slip away."
        effects:
          set_flag: settled_rice_queue
          change_trust:
            green_gang.broker: 4
            civilian.worker: -8 
          add_item: hidden_cash
          log_event: "You profited from unrest at a ration queue."

  - id: patrol_glance
    location_tags: [checkpoint]
    trigger_chance: 0.5
    preconditions:
      flags_missing: [survived_patrol_glance]
    narrative: "A patrol sergeant lingers over your papers half a second longer than comfort allows."
    options:
      - text: "Hold steady and meet his stare."
        effects:
          set_flag: survived_patrol_glance
          change_trust:
            kempeitai.officer: 5
          log_event: "You stood firm under a patrol sergeant's scrutiny."
      - text: "Lower your eyes and apologize."
        effects:
          set_flag: survived_patrol_glance
          change_trust:
            civilian.resident: 2
            kempeitai.officer: -2
          log_event: "You submitted to a patrol sergeant's scrutiny and passed."

  - id: dock_crate
    location_tags: [dock]
    trigger_chance: 0.5
    preconditions:
      flags_missing: [opened_dock_crate]
    narrative: "A crate lies split open on the dock, straw spilling into a puddle clack with oil."
    options:
      - text: "Search the crate before anyone notices."
        effects:
          set_flag: opened_dock_crate
          add_item: dock_manifest
          change_trust:
            british.dockmaster: 3
            green_gang.smuggler: 5
          log_event: "You searched a broken crate on the docks."
      - text: "Flag down a foreman."
        effects:
          set_flag: opened_dock_crate
          change_trust:
            civilian.worker: 5
            green_gang.smuggler: -5
          log_event: "You alerted a foreman about a broken crate."

  - id: hidden_prayer
    location_tags: [shrine]
    trigger_chance: 0.5
    preconditions:
      flags_missing: [found_hidden_prayer]
    narrative: "A candle guttering in the draft reveals fresh ash and a folded scrap tucked behind the altar rail."
    options:
      - text: "Take the talisman and the note."
        effects:
          set_flag: found_hidden_prayer
          add_item: temple_talisman
          change_trust:
            civilian.resident: 6
            ccp.organizer: 3
          log_event: "You found a hidden prayer note in a shrine."
      - text: "Leave it untouched."
        effects:
          set_flag: found_hidden_prayer
          change_trust:
            civilian.resident: 3
          log_event: "You left a hidden shrine message undisturbed."

  - id: alley_child
    location_tags: [alley]
    trigger_chance: 0.45
    preconditions:
      flags_missing: [helped_alley_child]
    narrative: "A child with bare feet watches you from behind a broken handcart, too hungry to hide properly."
    options:
      - text: "Share what little you have."
        effects:
          set_flag: helped_alley_child
          change_trust:
            civilian.resident: 10
            civilian.worker: 6
          log_event: "You shared scarce provisions with a hungry child."
      - text: "Keep walking."
        effects: 
          set_flag: helped_alley_child
          change_trust:
            civilian.resident: -4
          log_event: "You left a hungry child behind."
          
  - id: smoked_window
    location_tags: [safehouse]
    trigger_chance: 0.55
    preconditions:
      trust_ranges:
        ccp.organizer: [45, 100]
      flags_missing: [entered_smoked_window]
    narrative: "One safehouse window is smoked black from within. Someone opens it a finger-width when you pass."
    options:
      - text: "Give the passphrase you were told."
        effects:
          set_flag: entered_smoked_window
          change_trust:
            ccp.organizer: 12
          log_event: "A safehouse finally let you inside."
      - text: "Keep your silence and move on."
        effects:
          set_flag: skipped_smoked_window
          change_trust:
            ccp.organizer: -3
          log_event: "You passed a possible safehouse without making contact."

  - id: contraband_offer
    location_tags: [market]
    trigger_chance: 0.5
    preconditions:
      flags_missing: [resolved_contraband_offer]
    narrative: "A vendor opens his coat just enough for you to see medicine where soap should be."
    options:
      - text: "Buy the morphine and say nothing."
        effects:
          set_flag: resolved_contraband_offer
          add_item: contraband_morphine
          change_trust:
            green_gang.broker: 8
          log_event: "You bought contraband morphine from a market vendor."
      - text: "Warn him the patrols are close."
        effects:
          set_flag: resolved_contraband_offer
          change_trust:
            civilian.vendor: 8
            green_gang.broker: 2
          log_event: "You warned a vendor before the patrols arrived."

  - id: ledger_question
    location_tags: [warehouse]
    trigger_chance: 0.45
    preconditions:
      inventory_has: [coded_ledger]
      flags_missing: [showed_ledger]
    narrative: "A warehouse clerk notices the edge of the ledger in your pocket and abruptly loses his composure."
    options:
      - text: "Ask him what the numbers mean."
        effects:
          set_flag: showed_ledger
          change_trust:
            green_gang.broker: 10
          log_event: "A clerk reacted to the coded ledger you were carrying."
      - text: "Hide the ledger and leave."
        effects:
          set_flag: showed_ledger
          change_trust:
            civilian.worker: 3
          log_event: "You concealed the coded ledger when a clerk noticed it."

  - id: checkpoint_beggar
    location_tags: [checkpoint]
    trigger_chance: 0.4
    preconditions:
      flags_missing: [met_checkpoint_beggar]
    narrative: "A beggar sitting just outside the checkpoint taps the curb twice with a tin cup, then looks at your shoes instead of your face."
    options:
        - text: "Leave a coin and listen."
          effects:
            set_flag: met_checkpoint_beggar
            change_trust:
              civilian.vendor: 5
              ccp.courier: 4
            log_event: "A beggar near a checkpoint passed you a useful warning"
        - text: "Ignore the signal."
          effects:
            set_flag: met_checkpoint_beggar
            change_trust:
              civilian.vendor: -2
            log_event: "You ignored a beggar's coded warning."

  - id: river_smell
    location_tags: [bund]
    trigger_chance: 0.35
    preconditions:
      game_hour: [4, 7]
      flags_missing: [morning_river_smell]
    narrative: "The river smells of rain, coal and something metallic enough to taste. Dawn arrives slowly over ships that do not belong here."
    options:
      - text: "Stay and watch the barges."
        effects:
          set_flag: morning_river_smell
          change_trust:
            british.merchant: 3
            civilian.worker: 2
          log_event: "You watched contraband barges move at dawn on the river."
      - text: "Turn inland before the patrols finish changing shifts."
        effects:
          set_flag: morning_river_smell
          change_trust:
            kempeitai.patrol: -2
          log_event: "You left the Bund before the patrols settled into the morning."

  - id: borrowed_prayer
    location_tags: [residence]
    trigger_chance: 0.35
    preconditions: 
      inventory_has: [temple_talisman]
      flags_missing: [lent_talisman]
    narrative: "A neighbour's hands shake when she sees the temple charm in your pocket. 'Just for the night.' she says."
    options:
      - text: "Lend her the talisman."
        effects:
          set_flag: lent_talisman
          remove_item: temple_talisman
          change_trust:
            civilian.resident: 12
          log_event: "You lent a temple talisman to a frightened neighbour."
      - text: "Keep it."
        effects:
          set_flag: lent_talisman
          change_trust:
            civilian.resident: -6
          log_event: "You refused to lend a talisman to a frightened neighbour."

  - id: ruined_flyer
    location_tags: [school, old_city]
    trigger_chance: 0.4
    preconditions:
      flags_missing: [found_ruined_flyer]
    narrative: "Rain has pasted a propaganda flyer to the wall so badly that only a child's drawing shows beneath the torn corner."
    options:
      - text: "Peel it away carefully."
        effects:
          set_flag: found_ruined_flyer
          change_trust:
            civilian.resident: 4
            ccp.organizer: 4
          log_event: "You uncovered a child's drawing behind a propaganda flyer."
      - text: "Leave the wall untouched."
        effects:
          set_flag: found_ruined_flyer
          change_trust:
            civilian.resident: 1
          log_event: "You left a ruined flyer clinging to a wall."

  - id: choir_attic
    location_tags: [church, attic]
    trigger_chance: 0.5
    preconditions:
      flags_missing: [heard_attic_choir]
      game_hour: [18, 22]
    narrative: "Someone is singing above the rafters in a voice too soft for prayer and too steady for grief."
    options:
      - text: "Climb quietly toward the attic."
        effects:
          set_flag: heard_attic_choir
          change_trust:
            civilian.resident: 6
            ccp.organizer: 5
          log_event: "You found hidden voices in a church attic."
      - text: "Leave before the song ends."
        effects:
          set_flag: heard_attic_choir
          change_trust:
            civilian.resident: 2
          log_event: "You left a church before learning the identity of the singer above you."

  - id: silk_signal
    location_tags: [french, balcony]
    trigger_chance: 0.4
    preconditions:
      inventory_has: [silk_scarf]
      flags_missing: [used_silk_signal]
    narrative: "Across a narrow lane, another balcony displays the same shade of silk as the scarf in your pocket."
    options:
      - text: "Raise the scarf in reply."
        effects:
          set_flag: "used_silk_signal"
          change_trust:
            french_concession.merchant: 10
            log_event: "You answered a coded silk signal in the French Concession."
      - text: "Pretend not to notice."
        effects:
          set_flag: used_silk_signal
          change_trust:
            french_concession.merchant: -5
            log_event: "You ignored a possible signal from a balcony."
    
  - id: ledger_drop
    location_tags: [teahouse]
    trigger_chance: 0.35
    preconditions:
      inventory_has: [coded_ledger]
      flags_missing: [dropped_ledger_copy]
    narrative: "A man at the back table folds his napkin with absurd care, and says without looking up, 'Some numbers deserve to travel farther than their owners.'"
    options:
      - text: "Leave a copied page of the ledger beneath the saucer."
        effects:
          set_flag: dropped_ledger_copy
          change_trust:
            ccp.courier: 8
            green_gang.smuggler: -4
          log_event: "You quietly passed on a page from the coded ledger."
      - text: "Keep the ledger intact."
        effects:
          set_flag: dropped_ledger_copy
          change_trust:
            ccp.courier: -2
          log_event: "You kept the coded ledger to yourself."

  - id: bombed_shopfront
    location_tags: [commercial]
    trigger_chance: 0.45
    preconditions:
      flags_missing: [saw_bombed_shopfront]
    narrative: "A shattered window still smells of last night's explosives. Someone has already swept the glass into a neat, defeated pile."
    options: 
      - text: "Help the store owner board it up."
        effects:
          set_flag: saw_bombed_shopfront
          change_trust:
            civilian.vendor: -3
            ccp.guerilla: 2
          log_event: "You helped board up a bombed shopfront."
      - text: "Ask who did it."
        effects: 
          set_flag: saw_bombed_shopfront
          change_trust:
            civilian.vendor: -3
            kempeitai.informant: 4
          log_event: "You pressed a shopkeeper about a bombing while the dust was still fresh."

  - id: ferry_whistle
    location_tags: [river]
    trigger_chance: 0.35
    preconditions:
      game_hour: [5, 8]
      flags_missing: [heard_ferry_whistle]
    narrative: "A ferry whistle sounds once through the mist, then twice in shorter reply from the distance."
    options:
      - text: "Mark the rhythm in memory."
        effects:
          set_flag: heard_ferry_whistle
          change_trust:
            ccp.courier: 5
          log_event: "You memorized a coded ferry whistle at dawn."
      - text: "Dismiss it as river business."
        effects:
          set_flag: heard_ferry_whistle
          change_trust:
            civilian.worker: 1
          log_event: "You ignored the strange call and response on the river."

  - id: hidden_cash_offer
    location_tags: [gambling]
    trigger_chance: 0.4
    preconditions:
      inventory_has: [hidden_cash]
      flags_missing: [resolved_cash_offer]
    narrative: "A bookmaker offers to double your money if you are willing to bet on who survives tommorow's raid."
    options:
      - text: "Walk away in disgust."
        effects:
          set_flag: resolved_cash_offer
          change_trust:
            civilian.resident: 6
            green_gang.broker: -6
          log_event: "You refused to bet on the lives of your fellow citizens."
      - text: "Take the wager."
        effects:
          set_flag: resolved_cash_offer
          change_trust:
            green_gang.broker: 10
            civilian.resident: -10
          log_event: "You gambled on the outcome of a raid."

  - id: patrol_map
    location_tags: [office, checkpoint]
    trigger_chance: 0.35
    preconditions:
      flags_missing: [found_patrol_map]
    narrative: "On the wall behind an unattended desk hangs a patrol map annotated in a steadier hand than the official markings."
    options:
      - text: "Copy the route into memory."
        effects:
          set_flag: found_patrol_map
          add_item: patrol_route
          change_trust:
            ccp.courier: 10
          log_event: "You copied a patrol route from an unattended office."
      - text: "Leave before someone returns."
        effects: 
          set_flag: found_patrol_map
          change_trust:
            kempeitai.patrol: 1
          log_event: "You left an unattended office without touching the patrol map."

  - id: mourning_clothes
    location_tags: [cemetery, old_city]
    trigger_chance: 0.4
    preconditions:
      flags_missing: [spoke_to_mourner]
    narrative: "A mourner in plain black clothes kneels at an unmarked stone and asks whether you have seen anyone brave enough to remember names out loud."
    options:
      - text: "Say the city remembers quietly."
        effects:
          set_flag: spoke_to_mourner
          change_trust:
            civilian.resident: 8
          log_event: "You comforted a mourner in the cemetery."
      - text: "Say remembrance is dangerous."
        effects:
          set_flag: spoke_to_mourner
          change_trust:
            civilian.resident: -4
            kempeitai.informant: 3
          log_event: "You warned a mourner that memory itself would become dangerous if combined with resentment."

  - id: backroom_surgeon
    location_tags: [clinic, alley]
    trigger_chance: 0.4
    preconditions:
      inventory_has: [contraband_morphine]
      flags_missing: [met_backroom_surgeon]
    narrative: "In a curtained clinic room, a surgeon rinses blood from his hands and looks at the morphine in your pocket with professional desperation."   
    options: 
      - text: "Hand it over."
        effects:
          set_flag: met_backroom_surgeon
          remove_item: contraband_morphine
          change_trust:
            civilian.worker: 10
            ccp.organizer: 6
          log_event: "You gave contraband morphine to a backroom surgeon."
      - text: "Keep it for later."
        effects:
          set_flag: met_backroom_surgeon
          change_trust:
            civilian.worker: -8
          log_event: "You withheld morphine from a desperate surgeon."

  - id: pressman_glance 
    location_tags: [printshop]
    trigger_chance: 0.35
    preconditions:
      flags_missing: [met_pressman]
    narrative: "The pressman oils a machine that prints half lies and half truths and ultimately, nothing. 'However a broken clock is right twice a day' you say, and the pressman looks up at you with a glint of recognition. 'You know about the midnight runs, don't you?' he asks."
    options:
      - text: "Ask what runs after midnight."
        effects:
          set_flag: met_pressman
          change_trust:
            ccp.organizer: 7
            civilian.vendor: 3
          log_event: "A pressman hinted at midnight printing runs."
      - text: "Comment on the machine instead."
        effects:
          set_flag: met_pressman
          change_trust:
            civilian.vendor: 4
          log_event: "You kept a coversation with a pressman."

  - id: rooftop_signal
    location_tags: [rooftop, french]
    trigger_chance: 0.35
    preconditions:
      game_hour: [19, 23]
      flags_missing: [saw_rooftop_signal]
    narrative: "Three lanterns bloom on a nearby rooftop in a sequence too deliberate to be just coincidence."
    options:
      - text: "Count the pattern and remember it."
        effects:
          set_flag: saw_rooftop_signal
          change_trust:
            ccp.guerilla: 6
          log_event: "You memorized a lantern code from the rooftops."
      - text: "Wave back."
        effects:
          set_flag: saw_rooftop_signal
          change_trust:
            ccp.guerilla: 2
            kempeitai.patrol: 3
          log_event: "You answered a rooftop lantern signal and risked being seen."

  - id: exhausted_policeman
    location_tags: [checkpoint, french]
    trigger_chance: 0.35
    preconditions:
      flags_missing: [judged_policeman]
    narrative: "A concession policeman rubs his eyes and mutters that there are too many uniforms in the city and none of them truly belong to it."
    options:
      - text: "Offer him a ciggarete and listen "
        effects:
          set_flag: judged_policeman
          change_trust:
            french_concession.police: 8
          log_event: "You earned a tired policeman's trust."
      - text: "Tell him everyone serves someone now."
        effects:
          set_flag: judged_policeman
          change_trust:
            french_concession.police: -6
          log_event: "You pushed a tired policeman to reality."

  - id: refugee_suitcase
    location_tags: [station, refugee]
    trigger_chance: 0.45
    preconditions:
      flags_missing: [helped_refugee_suitcase]
    narrative: "A refugee family has tied their whole life into one suitcase, and the clasp gives way at the edge of the platform."
    options:
      - text: "Help them gather the spilled contents."
        effects:
          set_flag: helped_refugee_suitcase
          change_trust:
            civilian.resident: 10
            british.consul: 2
          log_event: "You helped a refugee family gayther the contents of a broken suitcase."
      - text: "Use the confusion to search what spilled out."
        effects:
          set_flag: helped_refugee_suitcase
          add_item: hidden_cash
          change_trust:
            civilian.resident: -12
          log_event: "You exploited a refugee family's panic for worldy gains."

  - id: cold_noodles
    location_tags: [market, food]
    trigger_chance: 0.35
    preconditions:
      flags_missing: [shared_cold_noodles]
    narrative: "A noodle seller scrapes the bottom of the pot and says there is just enough left for one bowl, maybe two if everyone pretends otherwise."
    options:
      - text: "Buy two and share one."
        effects:
          set_flag: shared_cold_noodles
          change_trust:
            civilian.vendor: 8
            civilian.worker: 4
          log_event: "You shared a bowl of cold noodles in the market with a stranger."
      - text: "Take the last full portion for yourself." 
        effects:
          set_flag: shared_cold_noodles
          change_trust:
            civilian.vendor: -4
          log_event: "You took the last full bowl for yourself."

  - id: late_train_manifest
    location_tags: [station]
    trigger_chance: 0.35
    preconditions:
      inventory_has: [dock_manifest]
      flags_missing: [compared_manifests]
    narrative: "A station porter glances at your manifest and goes pale. 'That crate was not meant to leave the river,' he whispers."
    options:
    - text: "Ask where it went." 
      effects:
        set_flag: compared_manifests
        change_trust:
          ccp.courier: 6
          british.dockmaster: 4
        log_event: "A porter linked your dock manifest to a vanished rail shipment."
    - text: "Fold the paper away."
      effects:
        set_flag: compared_manifests
        change_trust:
          british.dockmaster: -2
        log_event: "You chose not to press a porter about a suspicious shipment."
        
  - id: harbor_funeral
    location_tags: [dock, river]
    trigger_chance: 0.3
    preconditions:
      flags_missing: [witnessed_harbor_funeral]
      game_hour: [17, 20]
    narrative: "Men who never stop to mourn pause just long enough to push a wreath onto the black water."
    options:
      - text: "Stand with them in silence."
        effects:
          set_flag: witnessed_harbor_funeral
          change_trust:
            civilian.worker: 7
            british.dockmaster: 2
          log_event: "You stood in silence during an improvised harbor funeral."
      - text: "Leave before grief draws attention."
        effects:
          set_flag: witnessed_harbor_funeral
          change_trust:
            civilian.worker: -2
          log_event: "You left the harbor before a quiet funeral could become dangerous."

  - id: counterfeit_stamp
    location_tags: [office, french]
    trigger_chance: 0.35
    preconditions:
      inventory_has: [forged_pass]
      flags_missing: [tested_forged_pass]
    narrative: "A clerk handling permits pauses over your pass, then glances at a drawer where a real seal is hidden under his blotter."
    options:
      - text: "Slip him cash and ask for the proper stamp."
        effects:
          set_flag: tested_forged_pass
          remove_item: hidden_cash
          change_trust:
            french_concession.clerks: 10
          log_event: "You bribed a clerk to strengthen a forged pass."
      - text: "Take your chances and leave."
        effects:
          set_flag: tested_forged_pass
          change_trust:
            french_concession.clerks: -4
            kempeitai.officer: 2
          log_event: "You left with a weak forged pass rather than risk a bribe."

  - id: ash_under_nails
    location_tags: [printshop, alley]
    trigger_chance: 0.3
    preconditions:
      flags_missing: [noticed_print_ash]
    narrative: "The messenger who brushes past you has a printer's dust under his fingernails and ink stains on his cuffs. He does not look like a man who delivers messages for ordinary people."
    options:
      - text: "Follow him for about a block."
        effects:
          set_flag: noticed_print_ash
          change_trust:
            ccp.courier: 5
        log_event: "You shadowed a messenger carrying printshop ash on his hands."
      - text: "Memorize his face and let him go."
        effects:
          set_flag: noticed_print_ash
          change_trust:
            civilian.vendor: 2
          log_event: "You let a suspicious messenger go after memorizing his face."

  - id: bridge_rain
    location_tags: [bridge, river]
    trigger_chance: 0.3
    preconditions:
      flags_missing: [stood_in_bridge_rain]
    narrative: "Rain needles the bridge planks while a woman beneath a torn umbrella asks whether the city still has decent people."
    options:
      - text: "Tell her decency survives in fragments."
        effects:
          set_flag: stood_in_bridge_rain
          change_trust:
            civilian.resident: 8
          log_event: "You offered a stranger what hope you could on a bridge in the rain."
      - text: "Tell her survival matters more."
        effects:
          set_flag: stood_in_bridge_rain
          change_trust:
            civilian.resident: -4
            green_gang.enforcer: 2
          log_event: "You answered a question about decency with cold practicality."

  - id: soup_delivery
    location_tags: [residence]
    trigger_chance: 0.4
    preconditions:
      game_hour: [18, 22]
      trust_ranges:
        civilian.resident: [50, 100]
    narrative: "There's a knock at your door. When you open it, you find a bowl of hot soup and a note: 'For when the nights get cold.'"
    options:
      - text: "Accept it with gratitude."
        effects:
          change_trust:
            civilian.resident: 10
          log_event: "A neighbor brought you soup when you were struggling."
      - text: "Leave it outside."
        effects:
          change_trust:
            civilian.resident: -5
          log_event: "You refused a neighbor's kindness."

  - id: raid_warning
    location_tags: [checkpoint]
    trigger_chance: 0.3
    preconditions:
      game_hour: [19, 23]
      flags_required: [friend_saves_player]
    narrative: "Someone pulls you into an alley. 'Not tonight. They're raiding the checkpoint. Take the back way.'"
    options:
      - text: "Follow their advice."
        effects:
          set_flag: avoided_raid
          change_trust:
            civilian.resident: 8
          log_event: "A friend warned you about a raid."
      - text: "Continue as planned."
        effects:
          change_trust:
            civilian.resident: -5
          log_event: "You ignored a friend's warning about a raid."

  - id: old_friend_reunion
    location_tags: [market, residence]
    trigger_chance: 0.35
    preconditions:
      trust_ranges:
        civilian.resident: [70, 100]
    narrative: "An old friend spots you through the crowd and asks, 'Do you remember when Shanghai was different?'"
    options:
      - text: "Share a meal and talk about old times."
        effects:
          add_item: rice_bowl
          change_trust:
            civilian.resident: 12
          log_event: "You shared a meal and talked about better times with an old friend."
      - text: "Say you need to keep moving."
        effects:
          change_trust:
            civilian.resident: -3
          log_event: "You hurried past an old friend who wanted to talk."

  - id: ccp_recruit_workers
    location_tags: [commercial, docks]
