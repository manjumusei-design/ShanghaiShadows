    preconditions:
      trust_ranges:
        ccp.organizer: [40, 100]
      flags_missing: [recruited_workers]
    narrative: "A group of dockworkers gather in a shadowed alley, their faces gaunt from forced labour. They whisper about organizing a strike. A Japanese overseer watches from across the street, his truncheon tapping against his palm."
    options:
      - text: "Address the workers and help them organize."
        effects:
          set_flag: recruited_workers
          change_trust:
