      - text: "Hide the child and shelter the neighbours in the basement."
        effects:
          change_trust:
            ccp.organizer: 10
            civilian.resident: 15
          change_influence:
            ccp: 5
          log_event: "You sheltered neighbours from a Kempeitai midnight raid."
      - text: "Lock your door and stay silent."
        effects:
          change_trust:
            civilian.resident: -10
          log_event: "You stayed silent during a Kempeitai raid."

  - id: gmd_rescue_prisoner
