          change_influence:
            gmd: 10
          log_event: "You rescued a captured GMD operative from Kempeitai custody."
      - text: "It's too risky. Inform Chungking of the capture."
        effects:
          change_trust:
            gmd.officer: -5
          log_event: "A GMD operative was captured. You reported the loss."

