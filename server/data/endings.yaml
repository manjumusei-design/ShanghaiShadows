endings:
  - id: ccp_uprising
    headline: "THE PEOPLE RISE"
    paragraphs:
      - "The radio crackled at half past three in the morning. A voice, rough and shaking, read a statement from the underground committee. The Japanese garrison in Hongkou had fallen. Workers at the textile mills had seized the gates. Students poured out of the alley near Sichuan Road, carrying red banners they had hidden in attics for seven years. By dawn, the Rising Sun flag was gone from the Bund."
      - "The Kempeitai headquarters on Avenue Joffre burned through the night. Files, photographs, interrogation records, all of it feeding a fire that could be seen from across the river in Pudong. A crowd gathered at a safe distance. No one tried to put it out. Someone began singing the March of the Volunteers. Others joined, then stopped, then started again, as if they had forgotten how singing in public felt."
      - "Japanese soldiers retreated toward the harbour in columns. Some ran. A few officers walked slowly, swords still at their hips, refusing to hurry. The crowd parted for them. No one threw stones. The rage was real but the relief was stronger. Mothers held their children up to watch. Old men stood at doorways with their arms folded, saying nothing, tears running into collars that had not been washed in weeks."
      - "In a square near the old city wall, a woman climbed onto the base of a toppled statue. She shouted names into the crowd. Names of the disappeared. Names of the executed. Names of those who had died in cells without record. The crowd repeated each name after her. The sound carried through the narrow streets like a bell. {alias} was among those she named. Someone in the crowd nodded, as if confirming a fact too long unspoken."
      - "Rice appeared in the markets by afternoon. No one knew where it came from. Prices dropped to a quarter of what they had been the day before. A tea seller on Fuzhou Road opened his doors and served cups for free, saying the water had never stopped boiling, he had just been waiting. Children played in streets that had been under curfew for years. A dog that had been stray since 1938 found its old home and scratched at the door."
      - "The flag over the customs house was red now. The sound of boots on the Bund was Chinese boots, Chinese voices, Chinese commands. It was not perfect. It would not be simple. The suffering of the occupation had scarred everyone and everything. But on this morning, the people of Shanghai stood in the open and breathed air that belonged to them. The city was theirs again. The cost had been beyond counting."

  - id: gmd_return
    headline: "THE REPUBLIC RESTORED"
    paragraphs:
      - "They came from the west in trucks and on foot. Nationalist soldiers in field uniforms, dusty from the road, carrying the flag of the Republic. The garrison at the city limits offered no resistance. The war was over. The Japanese surrender had been signed on a battleship in a harbour far away, and now the soldiers were coming home to cities they had lost eight years ago."
      - "The column moved down Nanjing Road in the early afternoon. Crowds lined both sides. People threw paper from windows, not propaganda leaflets for once, but scraps of joy, old letters never sent, pages from banned books kept hidden under floorboards. A boy ran alongside a truck handing up tangerines. The soldiers took them and smiled. Some of the soldiers were boys themselves, sixteen, seventeen, with rifles taller than they were."
      - "A formal ceremony was held at the racecourse. A Nationalist general accepted the surrender of the remaining Japanese officers. The crowd stood in silence. It was not triumph they felt, not exactly. It was the absence of a weight they had carried so long they had forgotten its shape. When the general raised the flag, a woman near the front began to weep. The man beside her put his hand on her shoulder. He was weeping too."
      - "In the French Concession, shopkeepers swept their steps and repainted signs. The Japanese-language signs came down first, scraped off with knives and spatulas, the bare wood underneath raw and pale. A tailor on Rue du Consulat hung a sign that said 'Reopened.' He had closed in 1941. His sewing machine was rusted but he oiled it and sat down to work. A customer came in before he had threaded the needle."
      - "The Kempeitai buildings were sealed by military police. Files were boxed and labeled for tribunals that would take years. {alias} stood near one of these buildings, watching. A Nationalist officer asked if they wanted to testify. They said yes. The officer wrote the name in a notebook. The notebook was full of names. It would take months to read them all aloud."
      - "That night, for the first time in years, the city was quiet without being afraid. No boots in the hallway. No knock at midnight. No searchlights sweeping the rooftops. People left their doors open to catch the breeze. A night watchman walked his rounds with a lantern, calling the hour, and the sound was not threatening. It was just a man with a lantern, doing his job, in a city that was free."

  - id: unity
    headline: "ONE CHINA"
    paragraphs:
      - "It happened in a square that had no name left. The sign had been torn down years ago, the building facades were pocked with bullet holes, and the ground was still dark from a fire the month before. But on this morning two men stood on the broken steps of what had been a post office. One wore the uniform of the Communist Eighth Route Army. The other wore the field grey of the Nationalist forces. They shook hands."
      - "The crowd did not cheer at first. They stared. Some crossed their arms. A few turned away and walked home, unwilling to believe it, afraid of another betrayal. But most stayed. They watched the two men stand side by side and face the city together. A photographer from what remained of the Shanghai Times took one picture. The negative would survive. The handshake would be printed in newspapers around the world."
      - "A child walked up the steps carrying a flower. She was six, maybe seven. She had been born during the occupation. She had never seen a city without soldiers in it. She held the flower up to the man in the Communist uniform. He took it. Then she pulled another from her pocket and gave it to the man in the Nationalist uniform. He knelt down to accept it. The crowd made a sound that was not quite applause, not quite a sob, but something older than both."
      - "Behind the square, the streets were coming back to life. A noodle vendor opened his cart. A woman hung washing on a line strung between two blown-out windows. Two men argued over the ownership of a bicycle and a third man mediated the dispute with the patience of someone who had survived worse arguments by far. The ordinary had returned. It was fragile and incomplete, but it was there."
      - "{alias} watched from the edge of the square. Years of work had led to this moment. The trust built with both sides, the risks taken, the lives lost. None of it guaranteed this would last. The handshake on the steps was a gesture, not a treaty. But gestures matter. In a city that had learned to read meaning in the angle of a glance, the sight of two enemies standing together was a language everyone understood."
      - "That evening, the city cooked. Every stove, every brazier, every makeshift fire was lit. The smell of rice and pork and ginger moved through the streets like a tide. People ate on their doorsteps. They shared with neighbours they had never spoken to. They shared with strangers. The occupation had taught them hunger, and now they responded with food. Not a feast. Not a celebration. A meal. The first honest meal in eight years. The rice was real. The quiet was real. The future was uncertain. But tonight, Shanghai ate together."
