    - The door is open. Come in and close it behind you. The clock ticks louder when
      the room is empty.
    - You are three minutes early. I respect punctuality. Sit down.
    neutral:
    - I fix clocks. That is what the sign says.
    - Leave the watch on the counter. I will call you when it is ready.
    - I charge by the complication. Simple repairs, simple prices.
    friendly:
