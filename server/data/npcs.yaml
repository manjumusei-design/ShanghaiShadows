npcs:
  - id: liu_wei
    name: "Liu Wei, the rickshaw puller"
    description: "A wiry man in his forties, with calloused hands and deep set eyes that have seen more than most."
    faction: civilian
    role: worker
    personality: "cautious, loyal when trust is earned."
    awareness: 48
    schedule:
      6: "bund_dawn"
      12: "nanjing_road"
      18: "bund_dawn"
      21: "nanjing_road"
    dialogue:
      greeting:
        - "You seem to need a ride. I can take you anywhere in the city, for a price."
        - "Careful around the HongKou district, day in and day out, the Kampeitai are watching."
      friendly:
        - "I knew your friend, he was a good man."
        - "The Japanese devils are everywhere, but we must preservere. Shanghai is our home."
      neutral:
        - "I don't know you, but I can take you where you need to go."
      hostile:
        - "Don't talk to me, I have no room for another problem. I have endured enough hardships in this city to last two lifetimes."

  - id: sister_mei
    name: "Sister Mei"
    description: "A chapel nurse whose sleeves are always rolled past the elbow and whos patience has survived longer than sleep."
    faction: civilian
    role: resident
    personality: "compassionate, exhausted, quietly stubborn"
    awareness: 42
    schedule:
      6: french_04
      12: french_08
      18: french_12
      22: french_04
    dialogue:
      greeting:
        - "If you are bleeding, sit down. If not, make room for someone who is."
      friendly:
        - "Mercy is expensive these days, it's rarely at all virtue"
      neutral:
        - "Every day asks too much of everyone, everywhere."
      hostile:
        - "Get out."

  - id: captain_ishikawa
    name: "Captain Ishikawa"
    description: "A Kempeitai officer with tight gloves and an air of arrogance tucked behind a wry smile."
    faction: kempeitai
    role: officer
    personality: "cold, observant, politely cruel"
    awareness: 82
    faction_leader: true
    schedule:
      7: hongkou_03
      12: hongkou_08
      18: commercial_18
      22: hongkou_03
    dialogue:
      greeting:
        - "Shanghai rewards discipline. Try to learn that quickly."
      friendly:
        - "Reliable people are so much easier to keep alive."
      neutral:
        - "You will answer only what I ask, and nothing more."
      hostile:
        - "A liar always believes fear is bad luck."

  - id: madam_xu
    name: "Madam Xu"
    description: "Owner of a teahouse where gossip lands softly and leaves armed."
    faction: green_gang
    role: broker
    personality: "elegant, calculating, amused by weakness"
    awareness: 68
    schedule:
      9: commercial_06
      14: commercial_09
      19: commercial_06
      23: french_15
    dialogue:
      greeting:
        - "Tea costs so little as compared to gossip."
      friendly:
        - "For the right friends, I remember the useful things."
      neutral:
        - "Business survives ideology by keeping better books."
      hostile:
        - "You are asking to be remembered for the wrong reason."

  - id: father_benoit
    name: "Father Benoit"
    description: "A French priest whose cassock smells of candle smoke and rainwater."
    faction: french_concession
    role: clerks
    personality: "pious, conflicted, unexpectedly brave"
    awareness: 40
    schedule:
      6: french_02
      12: french_04
      18: french_07
      21: french_02
    dialogue:
      greeting:
        - "Peace is not absent here. It is simply outnumbered."
      friendly:
        - "The city keeps confessions that no church can hold."
      neutral:
        - "I offer shelter, not certainty."
      hostile:
        - "If you endanger my people, the door closes."

  - id: thomas_reed
    name: "Thomas Reed"
    description: "A British dock clerk with salt on his cuffs and a conscience he edits daily."
    faction: british
    role: dockmaster
    personality: "dry, compromised, not yet empty"
    awareness: 57
    schedule:
      8: docks_03
      12: docks_07
      18: docks_11
      22: bund_18
    dialogue:
      greeting:
        - "Nothing enters these ledgers clean, not even the paper."
      friendly:
        - "If I tell you the truth, pretend you stole it."
      neutral:
        - "Cargo moves. Men vanish. I record only one of those."
      hostile:
        - "You are far too interested in the wrong crates."

  - id: zhang_lan
    name: "Zhang Lan"
    description: "A market noodle seller whose ladle pauses whenever uniforms appear."
    faction: civilian
    role: vendor
    personality: "warm, watchful, practical"
    awareness: 46
    schedule:
      7: commercial_03
      12: commercial_05
      18: commercial_03
      22: oldcity_02
    dialogue:
      greeting:
        - "Eat while it is still hot. Everything else can wait."
      friendly:
        - "People talk when noodles are good enough to make them careless."
      neutral:
        - "I sell food, not certainty."
      hostile:
        - "Take your questions somewhere that can survive them."

  - id: yan_fen
    name: "Yan Fen"
    description: "A resistance courier who walks like she is always late and therefore never suspicious."
    faction: resistance
    role: courier
    personality: "quick, brave, unsentimental"
    awareness: 74
    schedule:
      6: oldcity_04
      12: commercial_14
      18: docks_09
      22: oldcity_18
    dialogue:
      greeting:
        - "If you know me, think again."
      friendly:
        - "A city can still move if enough hands push in secret."
      neutral:
        - "I don't linger. Neither should you."
      hostile:
        - "Turn around and forget my face."

  - id: old_wu
    name: "Old Wu"
    description: "A shrine keeper with soot on his sleeves and eyes that miss very little."
    faction: civilian
    role: resident
    personality: "patient, shrewd, ceremonial"
    awareness: 60
    schedule:
      5: oldcity_09
      12: oldcity_11
      18: oldcity_09
      21: oldcity_14
    dialogue:
      greeting:
        - "Offerings are cheap. Peace is not."
      friendly:
        - "Even the gods listen more closely these days."
      neutral:
        - "Light a stick if you must, but keep your hands steady."
      hostile:
        - "Take your bad fortune elsewhere."

  - id: inspector_moreau
    name: "Inspector Moreau"
    description: "A concession policeman whose fatigue has sharpened into cynicism."
    faction: french_concession
    role: police
    personality: "tired, skeptical, decent in flashes"
    awareness: 63
    schedule:
      8: french_06
      13: french_10
      19: french_14
      23: french_06
    dialogue:
      greeting:
        - "Every report is a lie told in a better suit."
      friendly:
        - "If I did not still care a little, I would have transferred."
      neutral:
        - "Do not make me notice you twice."
      hostile:
        - "I am too tired to be patient and too honest to look away."

  - id: qiao_ming
    name: "Qiao Ming"
    description: "A dockside gambler with nicotine fingers and a talent for hearing numbers before they are spoken."
    faction: green_gang
    role: smuggler
    personality: "slick, greedy, charming under pressure"
    awareness: 66
    schedule:
      10: docks_05
      15: docks_14
      20: docks_18
      23: docks_05
    dialogue:
      greeting:
        - "Odds change faster than loyalties here."
      friendly:
        - "I can move anything small enough to deny and dangerous enough to matter."
      neutral:
        - "A price first, a conscience later."
      hostile:
        - "You are one question away from expensive trouble."

  - id: hanna_rosen
    name: "Hanna Rosen"
    description: "A refugee schoolteacher who folds sorrow into perfect posture."
    faction: british
    role: merchant
    personality: "measured, kind, privately furious"
    awareness: 44
    schedule:
      7: hongkou_11
      12: hongkou_13
      17: hongkou_16
      21: hongkou_11
    dialogue:
      greeting:
        - "Children still ask future-tense questions. That must mean something."
      friendly:
        - "Memory is a form of resistance when power demands erasure."
      neutral:
        - "I teach what can still be carried."
      hostile:
        - "If you bring fear into this room, leave first and apologize elsewhere."

  - id: sergeant_hayashi
    name: "Sergeant Hayashi"
    description: "A patrol sergeant whose boots are always polished and whose suspicions are never off duty."
    faction: kempeitai
    role: patrol
    personality: "disciplined, suspicious, proud"
    awareness: 76
    schedule:
      6: hongkou_01
      12: commercial_25
      18: bund_10
      22: hongkou_05
    dialogue:
      greeting:
        - "Show me your face properly. Then your hands."
      friendly:
        - "A useful citizen knows when to stand still."
      neutral:
        - "You may pass. Slowly."
      hostile:
        - "You smell like excuses already."

  - id: lao_peng
    name: "Lao Peng"
    description: "A printshop foreman with ink in the seams of his skin."
    faction: resistance
    role: safehouse
    personality: "laconic, dependable, quietly defiant"
    awareness: 58
    schedule:
      8: french_18
      13: french_19
      18: french_18
      23: oldcity_20
    dialogue:
      greeting:
        - "Paper burns fast. Ideas do not."
      friendly:
        - "If a page survives the night, it has already won something."
      neutral:
        - "Mind the ink. It remembers carelessness."
      hostile:
        - "Printers have enemies enough without volunteers."

  - id: mrs_gu
    name: "Mrs. Gu"
    description: "A boarding-house keeper who inventories every tenant's grief with professional precision."
    faction: civilian
    role: resident
    personality: "sharp, maternal, unsentimental"
    awareness: 51
    schedule:
      7: oldcity_13
      12: oldcity_15
      18: oldcity_13
      22: oldcity_13
    dialogue:
      greeting:
        - "Rooms are scarce. Trouble is abundant. I rent only the first."
      friendly:
        - "Eat first. Schemes sound wiser on a full stomach."
      neutral:
        - "Pay on time and lie quietly."
      hostile:
        - "I have turned away men more dangerous and less obvious than you."

  - id: constable_doyle
    name: "Constable Doyle"
    description: "A British concession constable who looks as if he has begun doubting orders in the middle of carrying them out."
    faction: british
    role: consul
    personality: "formal, uneasy, morally fraying"
    awareness: 54
    schedule:
      9: bund_14
      14: french_09
      19: commercial_08
      22: bund_14
    dialogue:
      greeting:
        - "Procedure remains the same, though the city beneath it has changed."
      friendly:
        - "Some rules deserve to be bent until they remember humanity."
      neutral:
        - "I can offer little beyond a warning."
      hostile:
        - "Do not force me to choose between duty and decency in public."

  - id: dr_zhao
    name: "Dr. Zhao, the underground physician"
    description: "A weary doctor whose clinic treats more rope burns and bullet wounds than fevers these days."
    faction: resistance
    role: doctor
    personality: "compassionate, secretive, haunted"
    awareness: 75
    schedule:
      8: hidden_02
      14: commercial_05
      20: hidden_02
    dialogue:
      greeting:
        - "Come in quietly. These days even the walls have ears."
      friendly:
        - "I might be able to patch you up, but I can't fix what this city does to people."
      neutral:
        - "What can I do for today? Make it worth the risk."
      hostile:
        - "My door is closed to those who bring harm to my patients."

  - id: waiter_chen
    name: "Chen, the waiter"
    description: "A young man who seems to have ears everywhere."
    faction: civilian
    role: vendor
    personality: "observant, quiet, ambitious"
    awareness: 60
    schedule:
      10: commercial_08
      14: commercial_08
      18: commercial_08
      22: commercial_08
    dialogue:
      greeting:
        - "The special is silence today. What would you like instead?"
      friendly:
        - "There's something you should know about tonight's patrol route."
      neutral:
        - "Order what you want, but watch what you say."
      hostile:
        - "I don't serve those who bring trouble to my establishment."

  - id: sister_wang
    name: "Sister Wang"
    description: "A resistance organizer who hides her work behind community charity."
    faction: resistance
    role: safehouse
    personality: "fierce, maternal, pragmatic"
    awareness: 70
    schedule:
      9: residence_05
      13: church_12
      17: residence_10
      21: church_08
    dialogue:
      greeting:
        - "Helping neighbours is what decent people do, even in times like these."
      friendly:
        - "Your courage has been noticed in circles where it matters."
      neutral:
        - "Charity is the only currency that sill matters in this city."
      hostile:
        - "My resources go to those who understand what resistance truly means."

  - id: elder chen
    name: "Elder Chen"
    description: "A respected elder who remembers Shanghai before the occupation."
    faction: civilian
    role: resident
    personality: "wise, patient, influential"
    awareness: 40
    schedule:
      8: residence_02
      12: church_10
      16: residence_10
      20: residence_02
    dialogue:
      greeting:
        - "I've seen this city change governments like clothes, but its heart remains the same."
      friendly:
        - "Your actions remind me of when Shanghai still had fight in it."
      neutral:
        - "Sit and listen. The old stories have wisdom that the newspapers never print."
      hostile:
        - "The young act like they invented resistance. We, the old have invented survival."


  - id: priest_li
    name: "Father Li"
    description: "A Buddhist priest who provides sanctuary while preaching non-violence."
    faction: civilian
    role: resident
    personality: "peaceful, conflicted, philosophical"
    awareness: 45
    schedule: 
      7: church_05
      10: church_08
      14: church_08
      18: oldcity_03
    dialogue:
      greeting:
        - "Peace comes from within, even when the world outside is at war."
      friendly:
        - "I can offer you shelter, but I cannot offer you absoulution for what you must do."
      neutral:
        - "Sit in meditation. The world can wait a few more minutes."
      hostile:
        - "I cannot offer sanctuary to those who carry darkness in their hearts."

  - id: gangster_wu
    name: "Wu, the enforcer"
    description: "A green gang enforcer who cares more about business than any sort of ideology."
    faction: green_gang
    role: enforcer
    personality: "pragmatic, loyal, dangerous"
    awareness: 72
    schedule:
      10: commercial_12
      14: warehouse_08
      20: docks_18
      23: commercial_12
    dialogue:
      greeting:
        - "Business doesn't stop for ideology. Neither do I."
      friendly:
        - "You've been reliable. That earns you some benefits."
      neutral:
        - "What do you want? Make it worth my while."
      hostile:
        - "Cross me, and you'll learn why the Green Gang still runs this city."
      
  - id: reporter_chen
    name: "Chen, the underground journalist"
    description: "A journalist who writes the truth between the lines of occupation newspapers."
    faction: civilian
    role: courier
    personality: "truth-seeking, brave, paranoid"
    awareness: 68
    schedule:
      9: commercial_05
      13: french_11
      17: commercial_12
      21: hidden_08
    dialogue:
      greeting:
        - "The official news says one thing, but everyone knows the truth says another."
      friendly:
        - "I have information that you might find useful for your work."
      neutral:
        - "Read between the lines. That's where the real news is hidden."
      hostile:
        - "I don't trust everyone who claims to want the truth. Some want to use it."

  - id: student_luo
    name: "Luo, the student"
    description: "A university student who uses his education for resistance literature."
    faction: resistance
    role: courier
    personality: "idealistic, brave, naive"
    awareness: 40
    schedule:
      9: school_05
      13: french_07
      17: school_12
      21: oldcity_08
    dialogue:
      greeting:
        - "Education is the only weapon that they can never take away from us."
      friendly:
        - "I have some pamphlets that might interest you, if you can keep them safe."
      neutral:
        - "Keep your voice down. The walls have ears."
      hostile:
        - "I'm sorry, I can't talk to strangers about things that matter."

  - id: sergeant_yamamoto
    name: "Sergeant Yamamoto"
    description: "A Kempeitai sergeant who follows orders without enthusiasm but without hesistation."
    faction: kempeitai
    role: patrol
    personality: "dutiful, weary, conflicted"
    awareness: 65
    schedule:
      7: hongkou_01
      12: hongkou_01
      16: hongkou_05
      22: hongkou_01
    dialogue:
      greeting:
        - "Papers, please. Don't make this difficult for either of us."
      friendly:
        - "I try to give people the benefit of the doubt when I can."
      neutral:
        - "Just answer the questions and keep your hands visible."
      hostile:
        - "I've seen enough violence to know when someone is hiding something."

  - id: vendor_lin
    name: "Lin, the vegtable vendor"
    description: "An old woman who sells vegtables and information with equal discretion."
    faction: civilian
    role: vendor
    personality: "grandmotherly, sharp, networked"
    awareness: 55
    schedule:
      8: commercial_10
      12: commercial_10
      16: commercial_10
      20: commercial_10
    dialogue:
      greeting:
        - "Fresh today, assuming fresh still means anything these days."
      friendly:
        - "Take extra. You never know when you'll need your strength."
      neutral:
        - "Buy what you need, but don't draw attention to yourself."
      hostile:
        - "I'm afraid I'm out of what you're looking for, in more ways than one."

  - id: nurse_su
    name: "Nurse Su, the battlefield nurse"
    description: "A former battlefield nurse who treats civilians caught in the crossfire"
    faction: civilian
    role: doctor
    personality: "tough, experienced, burned out"
    awareness: 55
    schedule:
      8: oldcity_06
      14: hidden_05
      20: oldcity_06
    dialogue:
      greeting:
        - "I've seen wounds that don't heal and people who don't die. This city tests both."
      friendly:
        - "You have good instincts. That matters in this city."
      neutral:
        - "Medical supplies are scarce. Don't waste them."
      hostile:
        - "I treat everyone, but I don't help everyone. Remember the difference."
    
  - id: tailor_zhou
    name: "Zhou, the tailor"
    description: "A master tailor who measures clients for suits and for trust with the same quiet precision."
    faction: civilian
    role: vendor
    personality: "meticulous, discreet, quietly observant"
    awareness: 52
    schedule:
      8: commercial_07
      12: commercial_07
      17: commercial_07
      21: residence_08
    dialogue:
      greeting:
        - "A good suit hides nothing and reveals everything about the man wearing it."
      friendly:
        - "I stitched a message into the lining. Read it when you are alone."
      neutral:
        - "I sell clothes, not conversations. Pay at the counter."
      hostile:
        - "My shop serves respectable people. Kindly leave."
    
  - id: madam_tanaka
    name: "Madam Tanaka"
    description: "A Japanese civilian who runs a laundry and endures the hatred of neighbours she never wronged."\
    faction: kempeitai
    role: resident
    personality: "gentle, frightened, trapped by nationality"
    awareness: 38
    schedule:
      7: hongkou_07
      12: hongkou_09
      18: hongkou_07
      22: hongkou_07
    dialogue:
      greting:
        - "I only wash clothes. That is all. Please believe me."
      friendly:
        "Not all of us chose to be here. Some of us were brought by husbands who chose the empire."
      neutral:
      - "The laundry will be ready tommorow. Please do not come after dark."
      hostile:
        - "I know what you think of me. You are not entirely wrong."

  - id: chef_wang
    name: "Chef Wang"
    description: "A dockside cook whose kitchen feed laborers and whose back room feeds secrets to anyone who pays."
    faction: green_gang
    role: broker
    personality: "generous with food, stingy with truth, loyal to profit"
    awareness: 62
    schedule:
      9: docks_06
      12: docks_06
      18: docks_06
      23: warehouse_03
    dialogue:
      greeting:
        - "Sit down. The congee is hot and the walls are thick."
      friendly:
        - "Someone left a package for you. It is under the third counter." # Might need to add alternative dialogue
      neutral:
        - "Eat first. Business after. That is how trust is built."
      hostile:
        - "My kitchen feeds people who respect it. Not people who poison it."

  - id: merchant_sato
    name: "Merchant Sato"
    description: "A Japanese tradesman who deals in silk and espionage with equal competence."
    faction: kempeitai
    role: informant
    awareness: 78
    personality: "polite, calculating, two-faced"
    schedule:
      9: commercial_20
      13: bund_12
      18: commercial_15
      22: hongkou_03
    dialogue:
      greeting:
        - "Silk knows no loyalty. It simply flows towards money."
      friendly:
        - "The garrison changes guard at midnight. You did not hear it from me."
      neutral:
        - "I trade in goods, not politics. Please remember that."
      hostile:
        - "I have friends who wear uniforms. Would you like to meet them?"

  - id: corporal_watanabe
    name: "Corporal Watanabe"
    description: "A young Kempeitai corporal who joined for duty and stays because leaving is not an option."
    faction: kempeitai
    role: patrol
    personality: "nervous, obedient, ashamed"
    awareness: 60
    schedule:
      7: bund_08
      12: commercial_20
      18: bund_15
      23: hongkou_02
    dialogue:
      greeting:
        - "Papers. Quickly. I do not wish to be here longer than nessecary."
      friendly:
        - "I was a student once. I remember what books feel like."
      neutral:
        - "Move along. I did not see anything."
      hostile:
        - "Do not test me. I have orders I do not enjoy following."
      
  - id: diplomat_renault
    name: "Monsieur Renault"
    description: "A French diplomat who drinks too much and knows too little, or perhaps the reverse?"
    faction: french_concession
    role: clerks
    personality: "urbane, cynical, quietly sober"
    awareness: 50
    schedule:
      10: french_03
      14: french_07
      19: french_11
      23: french_03
    dialogue:
      greeting:
        - "Diplomacy is the art of letting someone else have your way. Shanghai tests that saying daily."
      friendly:
        - "The consulate safe can hold more than documents, if you understand my meaning."
      neutral:
        - "I cannot help everyone. I can barely help myself."
      hostile:
        - "You overestimate my influence and underestimate my caution."

  - id: professor_muller
    name: "Professor Muller"
    description: "A German adademic exiled from Nazi Germany who finds Shanghai no less complicated."
    faction: british
    role: clerks
    personality: "bookish, melancholic, principled"
    awareness: 46
    schedule:
      9: french_03
      12: school_03
      17: french_06
      22: french_13
    dialogue:
      greeting:
        - "History does not repeat, but it rhymes with disturbing frequency in this city."
      friendly: 
        - "I have documents that prove what the world prefers to ignore."
      neutral:
        - "I teach because it is the only honest work left."
      hostile:
        - "I left one regime that burned books. I will not tolerate another."

  - id: rickshaw_ah_fook
    name: "Ah Fook"
    description: "A teenage rickshaw boy who knows eery shortcut and sees everything from the street level."
    faction: civilian
    role: worker
    personality: "cheerful, cunning, fearless"
    awareness: 65
    schedule:
      6: bund_03
      10: commercial_04
      15: hongkou_08
      20: bund_03
    dialogue:
      greeting:
        - "Need a ride? I know Shanghai better than any map"
      friendly:
        - "I saw soldiers moving toward the warehouse district tonight. Just so you know."
      neutral:
        - "Fare is fare. I don't carry passengers who haggle with danger."
      hostile:
        - "I don't know anything and I didn't see anything. Leave me alone."
    
  - id: abramowitz
    name: "Herr Abramowitz"
    description: "A Jewish refugee violinist who plays in cafes and carries the weight of two lost homelands."
    faction: german
    role: merchant
    personality: "artistic, greiving, resilient"
    awareness: 42
    schedule:
      10: french_01
      14: commercial_13
      19: french_09
      23: french_16
    dialogue:
      greeting:
        - "Music does not need permission to exist. Neither, apparently, do I."
      friendly:
        - "The cafe owner hides people upstairs when the patrols come. Remember that."
      neutral:
        - "I play for my supper. THe city pays in silence and small kindnesses."
      hostile:
        - "I have lost one home already. I will not let you take this one."
    
  - id: courier_zheng
    name: "Zheng, the bicycle courier"
    description: "A young woman who delivers packages across the city with unnerving speed and discretion."
    faction: resistance
    role: courier
    personality: "athletic, focused, humourless"
    awareness: 72
    schedule: 
      7: hidden_12
      11: commercial_16
      16: french_20
      21: hidden_12
    dialogue:
      greeting:
