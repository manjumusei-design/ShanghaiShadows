cmd_help.text: "MOVEMENT:
  LOOK - Examine your surroundings
  GO <direction|room> - Move in a direction or auto-path to a known room
  MAP - Display visited areas
  FLEE - Random escape direction (costs morale)
  TAKE TRISHAW TO <district> - Fast travel to another district

INTERACTION:
  TALK TO <npc> - Speak with someone
  ASK <npc> ABOUT <topic> - Ask about a specific topic
  SAY <message> - Speak aloud
  WHISPER <target> <message> - Whisper to someone
  YELL <message> - Broadcast to nearby rooms
  GIVE <item> TO <target> - Give an item to someone
  BOND WITH <npc> USING <action> - Build trust through shared activity

COVERT:
  HIDE - Conceal yourself in hiding spots
  TAIL <npc> - Follow someone secretly
  DISGUISE AS <role> - Impersonate a faction role
  PLANT <item> - Plant evidence on an NPC
  PICKPOCKET <npc> - Steal from someone (risk of discovery)
  SEARCH - Look for hidden exits and items
  EXAMINE <target> - Detailed inspection of items, NPCs, or containers

ITEMS:
  TAKE <item> - Pick up an item
  DROP <item> - Discard an item
  INVENTORY - List your possessions
  WEAR <armour> - Equip armour
  REMOVE <armour> - Unequip armour
  OPEN <container> - Open a container
  CLOSE <container> - Close a container
  LOCK <container> - Lock a container (requires key)
  UNLOCK <container> - Unlock a container (requires key)
  PUT <item> IN <container> - Place item in container
  TAKE <item> FROM <container> - Retrieve item from container
  READ <item> - Read an item
  WRITE NOTE <text> - Create a note
  LEAVE NOTE - Drop a note in the room

SURVIVAL:
  EAT <item> - Consume food
  SLEEP - Sleep until dawn
  REST - Rest for a short time
  VISIT NURSE - Receive medical treatment (costs 20 fabi)
  JOURNAL [character] - View your journal or an archived journal
  STATUS - View your character's condition

COMBAT:
  ATTACK <target> - Engage in combat (courage-based)
  MOD WEAPON <weapon> WITH <mod> - Attach a mod to a weapon

ECONOMY:
  BUY <item> - Purchase items from vendors
  SELL <item> - Sell items for fabi

MISSIONS:
  MISSIONS - View active missions
  MISSIONS AVAILABLE - Show available missions
  MISSIONS ACCEPT <id> - Accept a mission
  MISSIONS COMPLETE <id> - Turn in a completed mission
  MISSIONS ABANDON <id> - Abandon a mission

SYSTEM:
  HELP - Display this help
  MEMORIAL - View the legacy book (fallen characters)
  QUIT - Save and exit

TIPS:
- Faction clothing affects NPC reactions
- Safe rooms (inns, clinics) protect from arrest
- Curfew is enforced from 20:00-06:00
- Multiple perception checks reveal hidden details
- Building trust unlocks missions and resources"
